<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — AI Meeting ActionFlow</title>
    <meta name="description" content="Create your AI Meeting ActionFlow account.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="auth-page">

    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">⚡</div>
            <h1>ActionFlow</h1>
            <p>Create your account</p>
        </div>

        <div id="alert" class="alert"></div>

        <!-- Google Sign-In button -->
        <div id="g_id_onload"
             data-client_id="972823074196-qoslhjrboldnhdfb85rmat8s46h47tni.apps.googleusercontent.com"
             data-callback="handleGoogleCredential"
             data-auto_prompt="false">
        </div>
        <div class="google-btn-wrapper">
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="filled_black"
                 data-text="signup_with"
                 data-size="large"
                 data-logo_alignment="left"
                 data-width="320">
            </div>
        </div>

        <div class="auth-link">
            Already have an account? <a href="index.html">Sign in with Google</a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="signup.js"></script>
</body>
</html>

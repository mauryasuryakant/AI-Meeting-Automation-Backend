<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team — AI Meeting ActionFlow</title>
    <meta name="description" content="Manage your team members. ActionFlow will automatically match them to meeting action items and send task emails.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="app-page">

    <!-- ─── Header ─────────────────────────────────────────────────────── -->
    <header class="app-header">
        <div class="header-inner">
            <a href="dashboard.html" class="header-logo">
                <div class="logo-badge">⚡</div>
                ActionFlow
            </a>
            <nav class="header-nav">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="employees.html" class="nav-link active">Team</a>
            </nav>
            <div class="header-right">
                <div class="avatar" id="user-avatar" role="button" aria-label="Open user menu" tabindex="0"></div>
                <div class="dropdown" id="user-dropdown" role="menu">
                    <div class="dropdown-header">
                        <div class="name" id="dropdown-name"></div>
                        <div class="email" id="dropdown-email"></div>
                    </div>
                    <a href="dashboard.html" class="dropdown-item" role="menuitem">
                        📊 Dashboard
                    </a>
                    <button class="dropdown-item danger" id="btn-logout" role="menuitem">
                        ↩ Logout
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- ─── Main ───────────────────────────────────────────────────────── -->
    <main class="app-main">

        <div class="page-header">
            <h1 class="page-title">Team Management</h1>
            <p class="page-subtitle">Add your team members — ActionFlow will match their names in meeting transcripts and email them automatically.</p>
        </div>

        <div class="employee-layout">

            <!-- Add Employee Form -->
            <div class="card" style="margin-bottom: 0;">
                <div class="card-title">➕ Add Team Member</div>
                <form id="add-form">
                    <div class="form-group">
                        <label for="emp-name">Full Name</label>
                        <input type="text" id="emp-name" class="form-input" placeholder="John Doe" autocomplete="off" required>
                    </div>
                    <div class="form-group">
                        <label for="emp-email">Email Address</label>
                        <input type="email" id="emp-email" class="form-input" placeholder="john@company.com" autocomplete="off" required>
                    </div>
                    <div id="add-alert" class="alert"></div>
                    <button type="submit" id="add-btn" class="btn btn-primary">
                        <span class="btn-text">Add Member</span>
                        <div class="spinner" id="add-spinner"></div>
                    </button>
                </form>
            </div>

            <!-- Employee List -->
            <div class="card" style="margin-bottom: 0;">
                <div class="card-title">
                    👥 Your Team
                    <span class="badge badge-muted" id="emp-count" style="margin-left: auto;">0 members</span>
                </div>
                <div id="employee-list">
                    <div class="empty-state">
                        <div class="empty-icon">👤</div>
                        <p>No team members yet.</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="auth.js"></script>
    <script src="employees.js"></script>
</body>
</html>
